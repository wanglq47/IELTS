<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--serif:'Source Serif 4',Georgia,serif;--sans:'DM Sans',system-ui,sans-serif;--ink:#1a1a18;--ink2:#4a4a46;--ink3:#8a8a84;--rule:#d8d6cf;--rule2:#eceae3;--surface:#f5f3ed;--surface2:#faf9f5;--white:#fff;--accent:#1a4a7a;--accent2:#e8f0fa;--green:#1a5c35;--green2:#e6f4ec;--red:#8c2020;--red2:#fdf0f0;--r:8px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:var(--sans);background:var(--surface);color:var(--ink)}
header{background:var(--white);border-bottom:1px solid var(--rule);padding:0 24px;height:52px;display:flex;align-items:center;gap:12px}
.back{color:var(--ink3);text-decoration:none;font-size:13px;display:flex;align-items:center;gap:4px}
.back:hover{color:var(--accent)}
.hbar{width:1px;height:16px;background:var(--rule)}
.brand{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--accent)}
main{max-width:820px;margin:0 auto;padding:32px 24px 80px}
h1{font-family:var(--serif);font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:var(--ink3);margin-bottom:24px}

/* Tabs */
.tabs{display:flex;gap:0;border:1px solid var(--rule);border-radius:var(--r);overflow:hidden;width:fit-content;margin-bottom:24px}
.tab-btn{padding:7px 20px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--ink3);font-family:var(--sans);transition:all .12s}
.tab-btn.active{background:var(--accent);color:#fff}
.tab-btn:not(.active):hover{background:var(--rule2);color:var(--ink)}

/* Filter bar */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fb{font-size:12px;padding:4px 12px;border-radius:14px;border:1px solid var(--rule);background:transparent;color:var(--ink3);cursor:pointer;font-family:var(--sans);transition:all .12s}
.fb:hover{color:var(--ink)}
.fb.active{background:var(--accent);border-color:var(--accent);color:#fff}
.export-btn{margin-left:auto;font-size:12px;padding:4px 12px;border-radius:14px;border:1px solid var(--rule);background:transparent;color:var(--ink3);cursor:pointer;font-family:var(--sans)}
.export-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Word list */
.cat-block{margin-bottom:28px}
.cat-header{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:10px;display:flex;align-items:center;gap:10px}
.cat-count{color:var(--accent);font-size:13px}
.cat-bar{flex:1;height:3px;background:var(--rule2);border-radius:2px;overflow:hidden;max-width:120px}
.cat-bar-fill{height:100%;border-radius:2px}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.word-card{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:10px;position:relative}
.word-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.word-text{flex:1}
.word-main{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--ink)}
.word-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.word-del{background:none;border:none;color:var(--rule);cursor:pointer;font-size:16px;line-height:1;padding:0;flex-shrink:0;transition:color .12s}
.word-del:hover{color:var(--red)}
.empty-state{text-align:center;padding:48px 0;color:var(--ink3);font-size:14px}

/* ── FLASHCARD MODE ── */
#flashcard-view{display:none}
.fc-controls{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.fc-ctrl-btn{padding:6px 16px;border-radius:var(--r);border:1px solid var(--rule);background:var(--white);font-size:13px;cursor:pointer;font-family:var(--sans);color:var(--ink2);transition:all .12s}
.fc-ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-ctrl-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
#fc-progress{font-size:13px;color:var(--ink3);margin-left:auto}

.fc-arena{display:flex;flex-direction:column;align-items:center;padding:20px 0}
.fc-card{width:100%;max-width:480px;min-height:200px;background:var(--white);border:1px solid var(--rule);border-radius:12px;padding:32px 28px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;transition:box-shadow .12s;user-select:none}
.fc-card:hover{box-shadow:0 4px 16px rgba(26,74,122,.08)}
.fc-word{font-family:var(--serif);font-size:28px;font-weight:600;color:var(--ink);margin-bottom:8px}
.fc-cat{font-size:12px;color:var(--ink3);margin-bottom:16px}
.fc-reveal{font-size:13px;color:var(--ink3)}
.fc-back{font-size:13px;color:var(--ink2);line-height:1.6;margin-top:8px;padding-top:16px;border-top:1px solid var(--rule2);width:100%}
.fc-dot{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.fc-nav{display:flex;gap:12px;margin-top:20px;align-items:center}
.fc-nav-btn{padding:8px 24px;border-radius:var(--r);border:1px solid var(--rule);background:var(--white);font-size:13px;cursor:pointer;font-family:var(--sans);color:var(--ink2);transition:all .12s}
.fc-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-nav-btn:disabled{opacity:.35;cursor:default}
#fc-index{font-size:13px;color:var(--ink3);min-width:60px;text-align:center}
.fc-shuffle-wrap{margin-top:12px;font-size:12px;color:var(--ink3)}

/* category guide */
.guide-box{background:var(--white);border:1px solid var(--rule);border-radius:var(--r);padding:20px 22px;margin-bottom:24px}
.guide-title{font-size:13px;font-weight:500;color:var(--ink2);margin-bottom:12px}
.guide-list{display:flex;flex-wrap:wrap;gap:8px}
.guide-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);padding:4px 10px;border-radius:12px;background:var(--surface);border:1px solid var(--rule)}
.guide-swatch{width:10px;height:10px;border-radius:50%}
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Home</a>
  <div class="hbar"></div>
  <div class="brand">Vocabulary</div>
</header>
<main>
  <h1>Vocabulary Bank</h1>
  <div class="sub" id="vocab-sub">0 words saved</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showView('list')">Word List</button>
    <button class="tab-btn" onclick="showView('flashcard')">Flashcards</button>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view">
    <div class="filter-bar" id="filter-bar">
      <button class="fb active" data-f="All" onclick="setFilter('All')">All</button>
      <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div id="word-list"></div>
  </div>

  <!-- FLASHCARD VIEW -->
  <div id="flashcard-view">
    <div class="fc-controls">
      <button class="fc-ctrl-btn active" id="fc-filter-all" onclick="fcSetFilter('All')">All</button>
      <div id="fc-cat-btns"></div>
      <span id="fc-progress"></span>
    </div>
    <div class="fc-arena">
      <div class="fc-card" id="fc-card" onclick="fcFlip()">
        <div class="fc-word" id="fc-word"></div>
        <div class="fc-cat" id="fc-cat-label"></div>
        <div class="fc-reveal" id="fc-reveal">Tap to see details</div>
        <div class="fc-back" id="fc-back" style="display:none"></div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn" id="fc-prev" onclick="fcNav(-1)">← Prev</button>
        <span id="fc-index">1 / 1</span>
        <button class="fc-nav-btn" id="fc-next" onclick="fcNav(1)">Next →</button>
      </div>
      <div class="fc-shuffle-wrap">
        <button class="fc-ctrl-btn" onclick="fcShuffle()" style="font-size:12px;padding:4px 12px">Shuffle</button>
      </div>
    </div>
  </div>
</main>

<script>
let vocab = [];
let currentView = 'list';
let listFilter = 'All';
let fcFilter = 'All';
let fcCards = [];
let fcIdx = 0;
let fcFlipped = false;

function load() {
  vocab = JSON.parse(localStorage.getItem('ielts_vocab')||'[]');
  document.getElementById('vocab-sub').textContent = vocab.length + ' word' + (vocab.length!==1?'s':'') + ' saved';
  renderList();
  buildFilterBtns();
}

function showView(v) {
  currentView = v;
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  document.getElementById('flashcard-view').style.display = v==='flashcard'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='list')||(i===1&&v==='flashcard')));
  if (v==='flashcard') initFlashcards();
}

function buildFilterBtns() {
  const cats = [...new Set(vocab.map(v=>v.category).filter(Boolean))];
  const bar = document.getElementById('filter-bar');
  bar.querySelectorAll('[data-f]:not([data-f="All"])').forEach(b=>b.remove());
  const exp = bar.querySelector('.export-btn');
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='fb'+(listFilter===cat?' active':'');
    btn.dataset.f=cat; btn.textContent=`${cat} (${vocab.filter(v=>v.category===cat).length})`;
    btn.onclick=()=>setFilter(cat);
    bar.insertBefore(btn,exp);
  });
  // Update All count
  bar.querySelector('[data-f="All"]').textContent = `All (${vocab.length})`;

  // Flashcard cat buttons
  const fcBtns = document.getElementById('fc-cat-btns');
  fcBtns.innerHTML='';
  cats.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='fc-ctrl-btn';
    btn.textContent=cat;
    btn.onclick=()=>fcSetFilter(cat);
    fcBtns.appendChild(btn);
  });
}

function setFilter(f) {
  listFilter=f;
  document.querySelectorAll('#filter-bar .fb').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  renderList();
}

function renderList() {
  const el=document.getElementById('word-list');
  el.innerHTML='';
  const items = listFilter==='All' ? vocab : vocab.filter(v=>v.category===listFilter);
  if(!items.length){el.innerHTML='<div class="empty-state">No words saved yet.<br>Select text while reading to add words.</div>';return;}

  // Group by category
  const grouped={};
  items.forEach(v=>{const k=v.category||'Uncategorised';if(!grouped[k])grouped[k]=[];grouped[k].push(v);});

  Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length).forEach(([cat,words])=>{
    const block=document.createElement('div'); block.className='cat-block';
    const header=document.createElement('div'); header.className='cat-header';
    const bar=document.createElement('div'); bar.className='cat-bar';
    const fill=document.createElement('div'); fill.className='cat-bar-fill';
    fill.style.cssText=`width:${Math.round(words.length/vocab.length*100)}%;background:${words[0].colorCss||'var(--accent)'}`;
    bar.appendChild(fill);
    header.innerHTML=`<span>${cat}</span>`;
    header.appendChild(bar);
    const count=document.createElement('span'); count.className='cat-count'; count.textContent=words.length;
    header.appendChild(count);
    block.appendChild(header);

    const grid=document.createElement('div'); grid.className='word-grid';
    words.forEach(v=>{
      const card=document.createElement('div'); card.className='word-card';
      const dot=document.createElement('div'); dot.className='word-dot'; dot.style.background=v.colorCss||'#ccc';
      const txt=document.createElement('div'); txt.className='word-text';
      const main=document.createElement('div'); main.className='word-main'; main.textContent=v.word;
      const meta=document.createElement('div'); meta.className='word-meta'; meta.textContent=v.secId||'';
      txt.appendChild(main); txt.appendChild(meta);
      const del=document.createElement('button'); del.className='word-del'; del.textContent='×';
      del.onclick=()=>{vocab.splice(vocab.indexOf(v),1);localStorage.setItem('ielts_vocab',JSON.stringify(vocab));load();};
      card.appendChild(dot); card.appendChild(txt); card.appendChild(del);
      grid.appendChild(card);
    });
    block.appendChild(grid);
    el.appendChild(block);
  });
}

// ── FLASHCARDS ────────────────────────────────────────────────────────────────
function fcSetFilter(f) {
  fcFilter=f;
  document.getElementById('fc-filter-all').classList.toggle('active',f==='All');
  document.querySelectorAll('#fc-cat-btns .fc-ctrl-btn').forEach(b=>b.classList.toggle('active',b.textContent===f));
  initFlashcards();
}

function initFlashcards() {
  fcCards = fcFilter==='All' ? [...vocab] : vocab.filter(v=>v.category===fcFilter);
  fcIdx=0; fcFlipped=false;
  renderCard();
}

function fcShuffle() {
  for(let i=fcCards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcCards[i],fcCards[j]]=[fcCards[j],fcCards[i]];}
  fcIdx=0; fcFlipped=false; renderCard();
}

function fcFlip() {
  if(!fcCards.length) return;
  fcFlipped=!fcFlipped;
  const back=document.getElementById('fc-back');
  const reveal=document.getElementById('fc-reveal');
  const v=fcCards[fcIdx];
  if(fcFlipped){
    back.style.display='block';
    reveal.style.display='none';
    back.innerHTML=`<span class="fc-dot" style="background:${v.colorCss||'#ccc'}"></span><strong>${v.category||'Uncategorised'}</strong><br><span style="font-size:12px;color:var(--ink3)">${v.secId||''}</span>`;
  } else {
    back.style.display='none';
    reveal.style.display='block';
  }
}

function fcNav(dir) {
  fcIdx=Math.max(0,Math.min(fcCards.length-1,fcIdx+dir));
  fcFlipped=false;
  renderCard();
}

function renderCard() {
  if(!fcCards.length){
    document.getElementById('fc-word').textContent='No words';
    document.getElementById('fc-cat-label').textContent='';
    document.getElementById('fc-index').textContent='0 / 0';
    document.getElementById('fc-back').style.display='none';
    document.getElementById('fc-reveal').style.display='block';
    document.getElementById('fc-progress').textContent='';
    return;
  }
  const v=fcCards[fcIdx];
  document.getElementById('fc-word').textContent=v.word;
  document.getElementById('fc-cat-label').textContent=v.category||'Uncategorised';
  document.getElementById('fc-index').textContent=(fcIdx+1)+' / '+fcCards.length;
  document.getElementById('fc-progress').textContent=`Reviewing ${fcCards.length} words`;
  document.getElementById('fc-back').style.display='none';
  document.getElementById('fc-reveal').style.display='block';
  document.getElementById('fc-prev').disabled=fcIdx===0;
  document.getElementById('fc-next').disabled=fcIdx===fcCards.length-1;
}

function exportCSV() {
  if(!vocab.length) return alert('No words saved yet.');
  const rows=[['Word','Category','Section','Color']];
  vocab.forEach(v=>rows.push([v.word,v.category||'',v.secId||'',v.color||'']));
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='ielts_vocab.csv'; a.click();
}

// Show list view by default
document.getElementById('flashcard-view').style.display='none';
load();
</script>
</body>
</html>
