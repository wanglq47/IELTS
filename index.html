<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --ink: #1a1a18; --ink2: #4a4a46; --ink3: #8a8a84;
  --rule: #d8d6cf; --rule2: #eceae3;
  --surface: #f5f3ed; --surface2: #faf9f5; --white: #ffffff;
  --accent: #1a4a7a; --accent2: #e8f0fa;
  --green: #1a5c35; --green2: #e6f4ec;
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-family: var(--sans); background: var(--surface); color: var(--ink); font-size: 15px; }

header {
  background: var(--white); border-bottom: 1px solid var(--rule);
  padding: 0 32px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.brand { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--accent); letter-spacing: .01em; }
.vocab-link {
  font-size: 13px; color: var(--ink3); text-decoration: none;
  padding: 5px 14px; border-radius: 20px; border: 1px solid var(--rule); transition: all .15s;
}
.vocab-link:hover { border-color: var(--accent); color: var(--accent); }

main { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

.page-title { font-family: var(--serif); font-size: 26px; font-weight: 600; margin-bottom: 4px; }
.page-sub { font-size: 14px; color: var(--ink3); margin-bottom: 32px; }

.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 32px; }
.stat-card { background: var(--white); border: 1px solid var(--rule); border-radius: var(--radius); padding: 14px 16px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 500; color: var(--accent); line-height: 1.1; }
.stat-lbl { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: .06em; margin-top: 3px; }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; align-items: center; }
.filter-btn {
  font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px;
  border: 1px solid var(--rule); background: transparent; color: var(--ink3); cursor: pointer; transition: all .15s;
}
.filter-btn:hover { color: var(--ink); border-color: var(--ink3); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.filter-search {
  margin-left: auto; padding: 5px 14px; border: 1px solid var(--rule); border-radius: 20px;
  font-size: 13px; font-family: var(--sans); background: var(--white); color: var(--ink);
  outline: none; width: 180px; transition: border-color .15s;
}
.filter-search:focus { border-color: var(--accent); }

.book-group { margin-bottom: 36px; }
.book-group-title {
  font-family: var(--serif); font-size: 16px; font-weight: 600; color: var(--ink2);
  margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--rule2);
  display: flex; align-items: center; gap: 10px;
}
.book-badge {
  font-family: var(--sans); font-size: 11px; font-weight: 500; padding: 2px 8px;
  border-radius: 10px; background: var(--surface); border: 1px solid var(--rule); color: var(--ink3);
}
.test-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }

.test-card {
  background: var(--white); border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 16px 18px; cursor: pointer; text-decoration: none; display: block;
  transition: border-color .15s, box-shadow .15s;
}
.test-card:hover { border-color: #aac4e0; box-shadow: 0 2px 8px rgba(26,74,122,.07); }
.test-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.test-name { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.done-badge {
  font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px;
  background: var(--green2); color: var(--green); border: 1px solid #b8e0c8; flex-shrink: 0; margin-left: 8px;
}
.test-meta { display: flex; gap: 14px; font-size: 12px; color: var(--ink3); margin-bottom: 14px; }
.test-score-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.test-progress { flex: 1; height: 3px; background: var(--rule2); border-radius: 2px; overflow: hidden; }
.test-progress-fill { height: 100%; border-radius: 2px; background: var(--accent); }
.test-progress-info { font-size: 11px; color: var(--ink3); white-space: nowrap; }
.test-btn {
  font-size: 12px; font-weight: 500; padding: 5px 14px; border-radius: 20px;
  background: var(--accent2); border: 1px solid #aac4e0; color: var(--accent);
  cursor: pointer; font-family: var(--sans); flex-shrink: 0; transition: background .15s;
}
.test-btn:hover { background: #d4e6f8; }
.test-btn.resume { background: var(--surface); border-color: var(--rule); color: var(--ink2); }
.test-btn.review { background: var(--green2); border-color: #b8e0c8; color: var(--green); }

.add-card {
  background: transparent; border: 1.5px dashed var(--rule); border-radius: var(--radius);
  padding: 16px 18px; display: flex; align-items: center; justify-content: center;
  gap: 8px; cursor: default; color: var(--ink3); font-size: 12px;
}

.empty-state { text-align: center; padding: 48px 0; color: var(--ink3); font-size: 14px; }

/* Vocab modal */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.35); align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: var(--white); border-radius: 12px; width: 500px; max-width: 95vw;
  max-height: 82vh; display: flex; flex-direction: column; border: 1px solid var(--rule);
}
.modal-head {
  padding: 16px 20px; border-bottom: 1px solid var(--rule2);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-head-title { font-size: 15px; font-weight: 500; }
.modal-head-sub { font-size: 12px; color: var(--ink3); margin-top: 2px; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--ink3); line-height: 1; }
.modal-filter { padding: 10px 20px; border-bottom: 1px solid var(--rule2); display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
.mf-btn {
  font-size: 11px; padding: 3px 10px; border-radius: 12px; border: 1px solid var(--rule);
  background: transparent; cursor: pointer; color: var(--ink3); font-family: var(--sans); transition: all .1s;
}
.mf-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.modal-body { flex: 1; overflow-y: auto; padding: 14px 20px; }
.modal-foot { padding: 12px 20px; border-top: 1px solid var(--rule2); display: flex; justify-content: flex-end; flex-shrink: 0; }
.export-btn {
  padding: 6px 16px; border-radius: var(--radius); border: 1px solid var(--rule);
  background: var(--surface); font-size: 13px; cursor: pointer; font-family: var(--sans);
}
.export-btn:hover { background: var(--rule2); }

.v-cat-block { margin-bottom: 20px; }
.v-cat-title {
  font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .07em;
  color: var(--ink3); margin-bottom: 6px; display: flex; justify-content: space-between;
}
.v-cat-count { color: var(--accent); }
.v-bar { height: 3px; border-radius: 2px; background: var(--rule2); margin-bottom: 10px; overflow: hidden; }
.v-bar-fill { height: 100%; border-radius: 2px; }
.v-word-row {
  display: flex; align-items: center; gap: 10px; padding: 5px 0;
  border-bottom: 1px solid var(--rule2); font-size: 13px;
}
.v-word-row:last-child { border-bottom: none; }
.v-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.v-word { font-family: var(--serif); font-weight: 600; flex: 1; }
.v-sec { font-size: 11px; color: var(--ink3); }

@media (max-width: 600px) {
  main { padding: 24px 16px 60px; }
  header { padding: 0 16px; }
  .stats-row { gap: 8px; }
  .test-grid { grid-template-columns: 1fr; }
  .filter-search { width: 130px; }
}
</style>
</head>
<body>

<header>
  <div class="brand">IELTS Practice</div>
  <a href="#" class="vocab-link" id="vocab-btn">Vocabulary</a>
</header>

<main>
  <div class="page-title">Reading Tests</div>
  <div class="page-sub">Select a test to begin. Your progress is saved automatically.</div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-lbl">Tests available</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-vocab">0</div><div class="stat-lbl">Words saved</div></div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-filter="all" id="filter-all">All</button>
    <input class="filter-search" id="search-input" placeholder="Search…" type="text">
  </div>

  <div id="test-list"></div>
</main>

<!-- Vocab modal -->
<div class="modal-overlay" id="vocab-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-head-title">Vocabulary Bank</div>
        <div class="modal-head-sub" id="vocab-modal-sub"></div>
      </div>
      <button class="modal-close" id="vocab-modal-close">×</button>
    </div>
    <div class="modal-filter" id="vocab-modal-filters"></div>
    <div class="modal-body" id="vocab-modal-body"></div>
    <div class="modal-foot">
      <button class="export-btn" id="export-btn">Export CSV</button>
    </div>
  </div>
</div>

<script>
let tests = [];
let activeFilter = 'all';
let searchQuery = '';

function getVocab() { return JSON.parse(localStorage.getItem('ielts_vocab') || '[]'); }
function getResults() { return JSON.parse(localStorage.getItem('ielts_results') || '[]'); }

function getTestResult(testId) {
  const all = getResults();
  const mine = all.filter(r => r.testId === testId);
  return mine.length ? mine[mine.length - 1] : null;
}

function countSubmitted(result) {
  return result ? Object.keys(result.submitted || {}).length : 0;
}

async function loadTests() {
  try {
    const r = await fetch('data/index.json');
    tests = await r.json();
  } catch(e) { tests = []; }
  render();
}

function render() {
  const vocab = getVocab();
  const done = tests.filter(t => countSubmitted(getTestResult(t.id)) >= (t.sections || 3)).length;
  document.getElementById('stat-total').textContent = tests.length;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-vocab').textContent = vocab.length;

  // Book filter buttons
  const books = [...new Set(tests.map(t => t.book))].sort((a,b) => {
    const na = parseInt(a.replace(/\D/g,'')), nb = parseInt(b.replace(/\D/g,''));
    return isNaN(na)||isNaN(nb) ? a.localeCompare(b) : na-nb;
  });
  const bar = document.getElementById('filter-bar');
  bar.querySelectorAll('[data-filter]:not([data-filter="all"])').forEach(b => b.remove());
  const searchEl = document.getElementById('search-input');
  books.forEach(book => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === book ? ' active' : '');
    btn.dataset.filter = book;
    btn.textContent = book;
    btn.onclick = () => setFilter(book);
    bar.insertBefore(btn, searchEl);
  });

  let visible = tests;
  if (activeFilter !== 'all') visible = visible.filter(t => t.book === activeFilter);
  if (searchQuery) visible = visible.filter(t =>
    (t.title+t.book+t.test).toLowerCase().includes(searchQuery.toLowerCase())
  );

  const listEl = document.getElementById('test-list');
  listEl.innerHTML = '';

  if (!visible.length) {
    listEl.innerHTML = '<div class="empty-state">No tests found.</div>';
    return;
  }

  // Group by book
  const grouped = {};
  visible.forEach(t => { if (!grouped[t.book]) grouped[t.book] = []; grouped[t.book].push(t); });

  Object.entries(grouped).sort((a,b)=>{
    const na=parseInt(a[0].replace(/\D/g,'')), nb=parseInt(b[0].replace(/\D/g,''));
    return isNaN(na)||isNaN(nb) ? a[0].localeCompare(b[0]) : na-nb;
  }).forEach(([book, bookTests]) => {
    const group = document.createElement('div');
    group.className = 'book-group';

    const title = document.createElement('div');
    title.className = 'book-group-title';
    title.innerHTML = `${book} <span class="book-badge">${bookTests.length} test${bookTests.length>1?'s':''}</span>`;
    group.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'test-grid';

    bookTests.forEach(t => {
      const result = getTestResult(t.id);
      const subCount = countSubmitted(result);
      const totalSecs = t.sections || 3;
      const isDone = subCount >= totalSecs;
      const inProgress = subCount > 0 && !isDone;

      const card = document.createElement('a');
      card.className = 'test-card';
      card.href = `reading.html?test=${t.id}`;

      const top = document.createElement('div');
      top.className = 'test-card-top';
      const name = document.createElement('div');
      name.className = 'test-name';
      name.textContent = t.test || t.title;
      top.appendChild(name);
      if (isDone) {
        const badge = document.createElement('span');
        badge.className = 'done-badge';
        badge.textContent = 'Done';
        top.appendChild(badge);
      }

      const meta = document.createElement('div');
      meta.className = 'test-meta';
      meta.innerHTML = `<span>${totalSecs} sections</span><span>${t.questions || '—'} questions</span>`;

      const scoreRow = document.createElement('div');
      scoreRow.className = 'test-score-row';

      if (inProgress || isDone) {
        const info = document.createElement('div');
        info.className = 'test-progress-info';
        info.textContent = `${subCount}/${totalSecs} done`;
        const prog = document.createElement('div');
        prog.className = 'test-progress';
        const fill = document.createElement('div');
        fill.className = 'test-progress-fill';
        fill.style.width = Math.round(subCount/totalSecs*100) + '%';
        prog.appendChild(fill);
        scoreRow.appendChild(info);
        scoreRow.appendChild(prog);
      } else {
        scoreRow.appendChild(document.createElement('div'));
      }

      const btn = document.createElement('button');
      btn.className = 'test-btn' + (isDone ? ' review' : inProgress ? ' resume' : '');
      btn.textContent = isDone ? 'Review' : inProgress ? 'Resume' : 'Start';
      btn.onclick = e => { e.preventDefault(); window.location.href = card.href; };
      scoreRow.appendChild(btn);

      card.appendChild(top);
      card.appendChild(meta);
      card.appendChild(scoreRow);
      grid.appendChild(card);
    });

    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg> Add JSON to /data`;
    grid.appendChild(addCard);

    group.appendChild(grid);
    listEl.appendChild(group);
  });
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === f));
  render();
}

document.getElementById('filter-all').onclick = () => setFilter('all');
document.getElementById('search-input').oninput = e => { searchQuery = e.target.value; render(); };

// ── VOCAB MODAL ───────────────────────────────────────────────────────────────
let vocabFilter = 'All';

document.getElementById('vocab-btn').onclick = e => {
  e.preventDefault();
  openVocabModal();
};
document.getElementById('vocab-modal-close').onclick = () => document.getElementById('vocab-modal').classList.remove('show');
document.getElementById('vocab-modal').onclick = e => { if (e.target.id === 'vocab-modal') document.getElementById('vocab-modal').classList.remove('show'); };

function openVocabModal() {
  vocabFilter = 'All';
  document.getElementById('vocab-modal').classList.add('show');
  renderVocabModal();
}

function renderVocabModal() {
  const vocab = getVocab();
  document.getElementById('vocab-modal-sub').textContent = vocab.length + ' words saved across all tests';

  // Filters
  const filtersEl = document.getElementById('vocab-modal-filters');
  filtersEl.innerHTML = '';
  const cats = ['All', ...new Set(vocab.map(v => v.category).filter(Boolean))];
  cats.forEach(cat => {
    const cnt = cat === 'All' ? vocab.length : vocab.filter(v=>v.category===cat).length;
    const btn = document.createElement('button');
    btn.className = 'mf-btn' + (cat === vocabFilter ? ' active' : '');
    btn.textContent = `${cat} (${cnt})`;
    btn.onclick = () => { vocabFilter = cat; renderVocabModal(); };
    filtersEl.appendChild(btn);
  });

  // Body
  const body = document.getElementById('vocab-modal-body');
  body.innerHTML = '';
  const items = vocabFilter === 'All' ? vocab : vocab.filter(v => v.category === vocabFilter);

  if (!items.length) {
    body.innerHTML = '<div style="text-align:center;padding:24px;color:var(--ink3);font-size:13px">No words saved yet.</div>';
    return;
  }

  // Group by category
  const grouped = {};
  items.forEach(v => { const k = v.category||'Uncategorised'; if (!grouped[k]) grouped[k]=[]; grouped[k].push(v); });

  Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length).forEach(([cat, words]) => {
    const block = document.createElement('div');
    block.className = 'v-cat-block';

    const catTitle = document.createElement('div');
    catTitle.className = 'v-cat-title';
    catTitle.innerHTML = `<span>${cat}</span><span class="v-cat-count">${words.length}</span>`;
    block.appendChild(catTitle);

    const bar = document.createElement('div');
    bar.className = 'v-bar';
    const fill = document.createElement('div');
    fill.className = 'v-bar-fill';
    fill.style.cssText = `width:${Math.round(words.length/vocab.length*100)}%;background:${words[0].colorCss||'var(--accent)'}`;
    bar.appendChild(fill);
    block.appendChild(bar);

    words.forEach(v => {
      const row = document.createElement('div');
      row.className = 'v-word-row';
      const dot = document.createElement('div');
      dot.className = 'v-dot';
      dot.style.background = v.colorCss;
      const word = document.createElement('div');
      word.className = 'v-word';
      word.textContent = v.word;
      const sec = document.createElement('div');
      sec.className = 'v-sec';
      sec.textContent = v.secId || '';
      row.appendChild(dot); row.appendChild(word); row.appendChild(sec);
      block.appendChild(row);
    });

    body.appendChild(block);
  });
}

// Export CSV
document.getElementById('export-btn').onclick = () => {
  const vocab = getVocab();
  if (!vocab.length) return alert('No vocabulary saved yet.');
  const rows = [['Word','Category','Section','Color']];
  vocab.forEach(v => rows.push([v.word, v.category||'', v.secId||'', v.color||'']));
  const csv = rows.map(r => r.map(c => '"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'ielts_vocabulary.csv';
  a.click();
};

loadTests();
</script>
</body>
</html>
