<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Reading Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #8a8a84;
  --rule: #d8d6cf;
  --rule2: #eceae3;
  --surface: #f5f3ed;
  --surface2: #faf9f5;
  --white: #ffffff;
  --accent: #1a4a7a;
  --accent2: #e8f0fa;
  --green: #1a5c35;
  --green2: #e6f4ec;
  --red: #8c2020;
  --red2: #fdf0f0;
  --amber: #7a4a00;
  --amber2: #fdf5e6;
  --radius: 6px;
  --hl-yellow: rgba(255,225,80,0.45);
  --hl-green: rgba(100,200,130,0.35);
  --hl-blue: rgba(80,160,240,0.3);
  --hl-pink: rgba(240,100,140,0.3);
  --hl-purple: rgba(160,100,240,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--sans); background: var(--surface); color: var(--ink); font-size: 15px; }

/* ── TOP BAR ── */
#topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--white);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
  gap: 16px;
}
#topbar-left { display: flex; align-items: center; gap: 16px; }
#brand { font-family: var(--serif); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: .01em; white-space: nowrap; }
#nav-toggle-btn {
  background: none; border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 4px 10px; font-size: 11px; color: var(--ink3); cursor: pointer;
  text-transform: uppercase; letter-spacing: .05em; transition: all .15s;
}
#nav-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

.sec-tabs { display: flex; gap: 2px; }
.sec-tab {
  font-family: var(--sans); font-size: 12px; font-weight: 500;
  padding: 5px 14px; border-radius: 20px;
  border: 1px solid transparent; background: transparent;
  color: var(--ink3); cursor: pointer; transition: all .15s;
}
.sec-tab:hover { color: var(--ink); background: var(--surface); }
.sec-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sec-tab.done { color: var(--green); border-color: var(--rule); }

#topbar-right { display: flex; align-items: center; gap: 20px; }
#q-progress { font-size: 12px; color: var(--ink3); white-space: nowrap; }
#q-dots { display: flex; gap: 3px; flex-wrap: wrap; max-width: 160px; }
.qdot { width: 7px; height: 7px; border-radius: 50%; background: var(--rule); transition: background .2s; }
.qdot.answered { background: var(--accent); }
.qdot.current-section { background: var(--rule2); border: 1px solid var(--rule); }
#timer {
  font-family: var(--sans); font-size: 18px; font-weight: 500;
  color: var(--ink); letter-spacing: .05em; min-width: 56px; text-align: right;
}
#timer.warn { color: #c0392b; }

/* ── MAIN COLUMNS ── */
#main { display: flex; height: calc(100vh - 52px); overflow: hidden; position: relative; }

/* ── TOC DRAWER ── */
#toc-drawer {
  position: absolute; top: 0; left: 0; z-index: 140;
  width: 280px; height: 100%;
  background: var(--white); border-right: 1px solid var(--rule);
  display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform .3s ease;
  box-shadow: 4px 0 15px rgba(0,0,0,0.05);
}
#toc-drawer.open { transform: translateX(0); }
#toc-head {
  padding: 16px 20px; border-bottom: 1px solid var(--rule2);
  display: flex; align-items: center; justify-content: space-between;
}
#toc-head span { font-size: 13px; font-weight: 600; color: var(--ink); text-transform: uppercase; letter-spacing: .05em; }
#toc-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--ink3); }
#toc-content { flex: 1; overflow-y: auto; padding: 20px; }

.toc-sec-item { margin-bottom: 24px; }
.toc-sec-title { 
  font-size: 11px; font-weight: 600; color: var(--accent); 
  text-transform: uppercase; margin-bottom: 12px; display: block;
  letter-spacing: .05em;
}
.toc-q-grid { 
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; 
}
.toc-q-num {
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
  border: 1px solid var(--rule); border-radius: 4px; font-size: 11px;
  cursor: pointer; transition: all 0.15s; color: var(--ink2); font-weight: 500;
}
.toc-q-num:hover { border-color: var(--accent); color: var(--accent); }
.toc-q-num.answered { background: var(--accent); color: #fff; border-color: var(--accent); }
.toc-q-num.current-q { border: 2px solid var(--accent); color: var(--accent); font-weight: 700; }

/* ── PASSAGE PANEL ── */
#passage-panel {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--rule);
  background: var(--white);
}
#passage-header {
  padding: 14px 28px 12px;
  border-bottom: 1px solid var(--rule2);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#passage-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em; color: var(--ink3); }
#passage-title { font-family: var(--serif); font-size: 17px; font-weight: 600; color: var(--ink); margin-top: 2px; }
#passage-body {
  flex: 1; overflow-y: auto;
  padding: 28px 36px;
  font-family: var(--serif); font-size: 15.5px; line-height: 1.85;
  color: var(--ink);
}
#passage-body p { margin-bottom: 1.1em; text-align: justify; }

/* ── QUESTIONS PANEL ── */
#questions-panel {
  width: 420px; flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--surface2);
}
#q-header {
  padding: 14px 20px 12px;
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: baseline; justify-content: space-between;
  flex-shrink: 0; background: var(--white);
}
#q-header-title { font-size: 13px; font-weight: 500; color: var(--ink2); }
#q-header-range { font-size: 11px; color: var(--ink3); }
#q-body { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
#q-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--rule);
  background: var(--white);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
#q-footer-info { font-size: 12px; color: var(--ink3); }

/* Question blocks */
.q-block {
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
}
.q-type-badge {
  display: inline-block; font-size: 10px; font-weight: 500;
  text-transform: uppercase; letter-spacing: .07em;
  padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
  background: var(--surface); color: var(--ink3); border: 1px solid var(--rule);
}
.q-number { font-size: 11px; font-weight: 500; color: var(--ink3); margin-bottom: 4px; }
.q-text { font-family: var(--serif); font-size: 14.5px; line-height: 1.6; color: var(--ink); margin-bottom: 10px; }
.q-fill {
  width: 100%; padding: 7px 10px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  font-family: var(--serif); font-size: 14px; background: var(--surface2);
  color: var(--ink); outline: none; transition: border-color .15s;
}
.q-fill:focus { border-color: var(--accent); background: var(--white); }
.q-fill.correct { border-color: var(--green); background: var(--green2); }
.q-fill.wrong { border-color: var(--red); background: var(--red2); }
.q-options { display: flex; flex-direction: column; gap: 6px; }
.q-opt {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 8px 10px; border-radius: var(--radius);
  border: 1px solid var(--rule); background: var(--surface2);
  cursor: pointer; transition: all .12s; font-family: var(--serif); font-size: 14px; line-height: 1.5;
}
.q-opt:hover { border-color: #aac4e0; background: var(--accent2); }
.q-opt.selected { border-color: var(--accent); background: var(--accent2); }
.opt-letter {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  background: var(--rule2); border: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500; color: var(--ink3); margin-top: 1px;
}
.q-opt.selected .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
.tfng-opts { display: flex; gap: 6px; }
.tfng-btn {
  flex: 1; padding: 7px 4px; text-align: center;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--surface2); cursor: pointer; font-size: 13px; font-weight: 500;
  color: var(--ink3); transition: all .12s;
}
.tfng-btn:hover { border-color: #aac4e0; color: var(--accent); }
.tfng-btn.selected { border-color: var(--accent); background: var(--accent2); color: var(--accent); }

/* Score card */
#score-card {
  display: none; margin: 0 20px 16px;
  background: var(--white); border: 1px solid var(--rule);
  border-radius: var(--radius); padding: 16px;
}
#score-card.show { display: block; }
.score-nums { display: flex; gap: 20px; margin-bottom: 8px; }
.score-num { text-align: center; }
.score-num .n { font-size: 28px; font-weight: 500; font-family: var(--sans); }
.score-num .l { font-size: 11px; color: var(--ink3); text-transform: uppercase; letter-spacing: .06em; margin-top: 1px; }

/* Color picker / Vocab Drawer Styles Remain Same */
#vocab-toggle {
  position: fixed; bottom: 24px; right: 24px; z-index: 150;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 10px rgba(26,74,122,.25); transition: transform .15s;
}
#vocab-drawer {
  position: fixed; bottom: 0; right: 0; z-index: 140;
  width: 320px; height: 70vh; max-height: 520px;
  background: var(--white); border: 1px solid var(--rule);
  border-radius: 10px 0 0 0; display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform .25s ease;
}
#vocab-drawer.open { transform: translateY(0); }
#btn-submit {
  padding: 8px 22px; border-radius: var(--radius);
  background: var(--accent); color: #fff; border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}

#color-popup { display: none; position: absolute; z-index: 200; background: var(--white); border: 1px solid var(--rule); border-radius: var(--radius); padding: 10px 12px; box-shadow: 0 4px 16px rgba(0,0,0,.08); min-width: 240px; }
#color-popup.show { display: block; }
#hl-popup { display:none; position:absolute; z-index:201; background:var(--white); border:1px solid var(--rule); border-radius:var(--radius); padding:12px 14px; box-shadow:0 4px 16px rgba(0,0,0,.1); min-width:160px; }

@media (max-width: 768px) {
  #main { flex-direction: column; height: auto; overflow: visible; }
  #passage-panel { height: 55vh; }
  #questions-panel { width: 100%; height: auto; }
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <span id="brand">IELTS Reading</span>
    <button id="nav-toggle-btn">Navigation</button>
    <div class="sec-tabs" id="sec-tabs"></div>
  </div>
  <div id="topbar-right">
    <div id="q-dots"></div>
    <span id="q-progress">0 / 0</span>
    <button id="settings-btn" style="background:none; border:1px solid var(--rule); border-radius:var(--radius); padding:4px 10px; font-size:12px; color:var(--ink3); cursor:pointer;">⚙ Settings</button>
    <div id="timer">60:00</div>
  </div>
</div>

<div id="main">
  <div id="toc-drawer">
    <div id="toc-head">
      <span>Test Navigation</span>
      <button id="toc-close">×</button>
    </div>
    <div id="toc-content"></div>
  </div>

  <div id="passage-panel">
    <div id="passage-header">
      <div>
        <div id="passage-label">Reading Passage</div>
        <div id="passage-title"></div>
      </div>
    </div>
    <div id="passage-body"></div>
  </div>

  <div id="questions-panel">
    <div id="q-header">
      <span id="q-header-title">Questions</span>
      <span id="q-header-range"></span>
    </div>
    <div id="score-card">
      <div class="score-nums">
        <div class="score-num"><div class="n" id="sc-correct">—</div><div class="l">Correct</div></div>
        <div class="score-num"><div class="n" id="sc-total">—</div><div class="l">Total</div></div>
        <div class="score-num"><div class="n" id="sc-band">—</div><div class="l">Band</div></div>
      </div>
    </div>
    <div id="q-body"></div>
    <div id="q-footer">
      <span id="q-footer-info"></span>
      <button id="btn-submit">Submit Section</button>
    </div>
  </div>
</div>

<button id="vocab-toggle">V</button>
<div id="vocab-drawer">
  <div id="vocab-drawer-head">
    <span style="padding:15px; font-weight:500;">Vocabulary</span>
    <button id="vocab-close" style="padding:15px; background:none; border:none; font-size:20px; cursor:pointer;">×</button>
  </div>
  <div id="vocab-list" style="flex:1; overflow-y:auto; padding:0 20px;"></div>
</div>

<div id="color-popup">
  <div style="font-size:11px; margin-bottom:8px; color:var(--ink3); text-transform:uppercase;">Mark word</div>
  <div id="cp-colors" style="display:flex; gap:6px; margin-bottom:12px;"></div>
  <div style="display:flex; justify-content:flex-end; gap:6px;">
    <button id="cp-cancel" style="padding:5px 10px; font-size:12px; border:1px solid var(--rule); background:none; border-radius:4px; cursor:pointer;">Cancel</button>
    <button id="cp-save" style="padding:5px 10px; font-size:12px; background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer;">Save</button>
  </div>
</div>

<div id="hl-popup">
  <div id="hl-popup-word" style="font-weight:600; margin-bottom:4px;"></div>
  <button id="hl-popup-del" style="width:100%; padding:6px; border:1px solid var(--red); color:var(--red); background:var(--red2); border-radius:4px; font-size:12px; cursor:pointer;">Remove</button>
</div>

<script>
// ─── STATE & CONSTANTS ────────────────────────────────────────────────────────
const DEFAULT_COLORS = [
  { name: 'Yellow', css: 'rgba(255,225,80,0.5)', hex: '#ffe150' },
  { name: 'Green',  css: 'rgba(100,200,130,0.45)', hex: '#64c882' },
  { name: 'Blue',   css: 'rgba(80,160,240,0.4)', hex: '#50a0f0' }
];

let state = {
  test: null,
  currentSection: 0,
  answers: {},
  submitted: {},
  vocab: JSON.parse(localStorage.getItem('ielts_vocab') || '[]'),
  colors: DEFAULT_COLORS,
  categories: ['Must learn', 'Academic'],
  timerSecs: 3600
};

let pendingSelection = null;
let selectedColorIdx = 0;

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function loadTest() {
  // Demo Data if fetch fails
  state.test = {
    id: 'mock-1',
    sections: [
      {
        id: 's1', label: 'Passage 1', passage_title: 'The History of Tea',
        passage: 'Tea is the world\'s most popular beverage after water.\n\nIt has a long history spanning thousands of years.',
        questions: [
          { id: 'q1', number: 1, type: 'fill', text: 'Tea is more popular than any drink except ___.', answer: 'water' },
          { id: 'q2', number: 2, type: 'mcq', text: 'How long is tea history?', options: ['100 years', 'Thousands of years'], answer: 1 }
        ]
      },
      {
        id: 's2', label: 'Passage 2', passage_title: 'Global Warming',
        passage: 'The Earth is getting warmer due to greenhouse gases.',
        questions: [
          { id: 'q3', number: 3, type: 'tfng', text: 'The planet temperature is stable.', answer: 'FALSE' }
        ]
      }
    ]
  };
  init();
}

function init() {
  renderSectionTabs();
  renderSection(0);
  startTimer();
  setupEventListeners();
}

function setupEventListeners() {
  document.getElementById('nav-toggle-btn').onclick = () => {
    document.getElementById('toc-drawer').classList.add('open');
    renderTOC();
  };
  document.getElementById('toc-close').onclick = () => {
    document.getElementById('toc-drawer').classList.remove('open');
  };
  document.getElementById('vocab-toggle').onclick = () => document.getElementById('vocab-drawer').classList.toggle('open');
  document.getElementById('vocab-close').onclick = () => document.getElementById('vocab-drawer').classList.remove('open');
}

// ─── CORE FUNCTIONS ───────────────────────────────────────────────────────────
function renderSection(idx) {
  state.currentSection = idx;
  const sec = state.test.sections[idx];
  
  // Update UI
  document.getElementById('passage-title').textContent = sec.passage_title;
  document.getElementById('passage-body').innerHTML = sec.passage.split('\n\n').map(p => `<p>${p}</p>`).join('');
  
  const qBody = document.getElementById('q-body');
  qBody.innerHTML = '';
  sec.questions.forEach(q => qBody.appendChild(createQuestionBlock(q, sec.id)));

  updateProgress(sec);
  updateSubmitBtn(sec);
  renderSectionTabs();
}

function switchSection(idx) {
  renderSection(idx);
  if (document.getElementById('toc-drawer').classList.contains('open')) renderTOC();
}

function createQuestionBlock(q, secId) {
  const block = document.createElement('div');
  block.className = 'q-block';
  block.id = 'qblock-' + q.id;
  block.innerHTML = `
    <div class="q-type-badge">${q.type}</div>
    <div class="q-number">Question ${q.number}</div>
    <div class="q-text">${q.text}</div>
  `;
  
  const inputContainer = document.createElement('div');
  if(q.type === 'fill') {
    const inp = document.createElement('input');
    inp.className = 'q-fill';
    inp.value = state.answers[q.id] || '';
    inp.oninput = (e) => { state.answers[q.id] = e.target.value; updateProgress(state.test.sections[state.currentSection]); };
    inputContainer.appendChild(inp);
  } else if(q.type === 'mcq') {
    const opts = document.createElement('div');
    opts.className = 'q-options';
    q.options.forEach((o, i) => {
      const btn = document.createElement('div');
      btn.className = `q-opt ${state.answers[q.id] === i ? 'selected' : ''}`;
      btn.innerHTML = `<span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${o}</span>`;
      btn.onclick = () => {
        state.answers[q.id] = i;
        renderSection(state.currentSection);
      };
      opts.appendChild(btn);
    });
    inputContainer.appendChild(opts);
  }
  
  block.appendChild(inputContainer);
  return block;
}

// ─── TOC RENDERING ────────────────────────────────────────────────────────────
function renderTOC() {
  const container = document.getElementById('toc-content');
  container.innerHTML = '';

  state.test.sections.forEach((sec, sIdx) => {
    const secDiv = document.createElement('div');
    secDiv.className = 'toc-sec-item';
    secDiv.innerHTML = `<span class="toc-sec-title">${sec.label}</span>`;

    const grid = document.createElement('div');
    grid.className = 'toc-q-grid';

    sec.questions.forEach(q => {
      const isAnswered = state.answers[q.id] !== undefined && state.answers[q.id] !== '';
      const isCurrent = sIdx === state.currentSection;
      
      const qBtn = document.createElement('div');
      qBtn.className = `toc-q-num ${isAnswered ? 'answered' : ''}`;
      // 如果是当前正在做的 Section 的题号，且该题就在视图中，可以加个边框标记
      qBtn.textContent = q.number;
      
      qBtn.onclick = () => {
        switchSection(sIdx);
        setTimeout(() => {
          const el = document.getElementById('qblock-' + q.id);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        document.getElementById('toc-drawer').classList.remove('open');
      };
      grid.appendChild(qBtn);
    });

    secDiv.appendChild(grid);
    container.appendChild(secDiv);
  });
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function renderSectionTabs() {
  const tabs = document.getElementById('sec-tabs');
  tabs.innerHTML = '';
  state.test.sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = `sec-tab ${i === state.currentSection ? 'active' : ''}`;
    btn.textContent = sec.label;
    btn.onclick = () => switchSection(i);
    tabs.appendChild(btn);
  });
}

function updateProgress(sec) {
  const answered = sec.questions.filter(q => state.answers[q.id]).length;
  document.getElementById('q-progress').textContent = `${answered} / ${sec.questions.length}`;
}

function updateSubmitBtn(sec) {
  const btn = document.getElementById('btn-submit');
  btn.disabled = !!state.submitted[sec.id];
  btn.textContent = btn.disabled ? 'Submitted' : 'Submit Section';
}

function startTimer() {
  setInterval(() => {
    state.timerSecs--;
    const m = Math.floor(state.timerSecs / 60);
    const s = state.timerSecs % 60;
    document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
  }, 1000);
}

loadTest();
</script>
</body>
</html>
