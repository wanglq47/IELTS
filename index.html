<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --ink: #1a1a18;
  --ink2: #4a4a46;
  --ink3: #8a8a84;
  --rule: #d8d6cf;
  --rule2: #eceae3;
  --surface: #f5f3ed;
  --surface2: #faf9f5;
  --white: #ffffff;
  --accent: #1a4a7a;
  --accent2: #e8f0fa;
  --green: #1a5c35;
  --green2: #e6f4ec;
  --red: #8c2020;
  --radius: 8px;
  --shadow: 0 4px 12px rgba(0,0,0,0.03);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { height: 100vh; font-family: var(--sans); background: var(--surface); color: var(--ink); overflow: hidden; display: flex; flex-direction: column; }

/* ── SHARED TOPBAR ── */
#topbar {
  height: 56px; background: var(--white); border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px; z-index: 200;
}
#topbar-left { display: flex; align-items: center; gap: 24px; }
#brand { font-family: var(--serif); font-size: 18px; font-weight: 700; color: var(--accent); cursor: pointer; }
.nav-links { display: flex; gap: 12px; }
.nav-btn {
  background: none; border: none; font-size: 13px; font-weight: 500; color: var(--ink3);
  cursor: pointer; padding: 6px 12px; border-radius: 6px; transition: all .2s;
}
.nav-btn.active { color: var(--accent); background: var(--accent2); }

/* ── VIEW CONTAINERS ── */
.view { display: none; height: calc(100vh - 56px); width: 100%; overflow: hidden; }
.view.active { display: flex; }

/* ── HOME VIEW (DASHBOARD) ── */
#home-view { padding: 40px; overflow-y: auto; flex-direction: column; align-items: center; }
.dash-grid { display: grid; grid-template-columns: 1fr 320px; gap: 40px; max-width: 1100px; width: 100%; }
.section-title { font-family: var(--serif); font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--ink); }

/* Question Bank Cards */
.book-shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
.book-card {
  background: var(--white); border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 24px; cursor: pointer; transition: all .2s; box-shadow: var(--shadow);
}
.book-card:hover { transform: translateY(-4px); border-color: var(--accent); }
.book-tag { font-size: 10px; font-weight: 600; text-transform: uppercase; color: var(--ink3); letter-spacing: .05em; }
.book-title { font-family: var(--serif); font-size: 17px; margin: 8px 0 16px; }
.book-progress { height: 4px; background: var(--rule2); border-radius: 2px; overflow: hidden; }
.book-progress-fill { height: 100%; background: var(--accent); width: 0%; }

/* Quick Vocab Sidebar */
.vocab-quick-list {
  background: var(--white); border: 1px solid var(--rule); border-radius: var(--radius);
  padding: 20px; display: flex; flex-direction: column; height: fit-content;
}
.vocab-stat-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--ink3); margin-bottom: 12px; }

/* ── TEST VIEW (Existing Logic Integrated) ── */
#test-view { flex-direction: row; }
#passage-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--rule); background: #fff; }
#passage-body { flex: 1; overflow-y: auto; padding: 40px 60px; font-family: var(--serif); font-size: 16px; line-height: 1.8; text-align: justify; }
#questions-panel { width: 450px; background: var(--surface2); display: flex; flex-direction: column; }
#q-body { flex: 1; overflow-y: auto; padding: 24px; }
#q-footer { padding: 16px 24px; background: #fff; border-top: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }

/* ── VOCAB LAB VIEW ── */
#vocab-view { padding: 40px; flex-direction: column; align-items: center; overflow-y: auto; }
.vocab-container { max-width: 900px; width: 100%; }
.vocab-category-block { margin-bottom: 40px; }
.cat-header { border-bottom: 1px solid var(--rule); padding-bottom: 8px; margin-bottom: 16px; display: flex; justify-content: space-between; }
.vocab-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: var(--radius); border: 1px solid var(--rule); overflow: hidden; }
.vocab-table th { text-align: left; padding: 12px 16px; font-size: 11px; text-transform: uppercase; color: var(--ink3); background: var(--surface2); }
.vocab-table td { padding: 14px 16px; border-bottom: 1px solid var(--rule2); font-size: 14px; }
.word-text { font-family: var(--serif); font-weight: 600; font-size: 16px; color: var(--accent); }

/* Interactive Elements */
.hl { cursor: pointer; border-radius: 2px; }
#color-popup, #hl-popup { 
    display: none; position: absolute; z-index: 300; background: #fff; 
    border: 1px solid var(--rule); border-radius: 8px; padding: 12px; 
    box-shadow: 0 8px 24px rgba(0,0,0,0.1); min-width: 180px; 
}

/* ── BUTTONS ── */
.btn-primary { background: var(--accent); color: #fff; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
.btn-primary:hover { opacity: 0.9; }

@media (max-width: 900px) {
  .dash-grid { grid-template-columns: 1fr; }
  #test-view { flex-direction: column; }
  #questions-panel { width: 100%; height: 50vh; }
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-left">
    <div id="brand" onclick="switchView('home')">IELTS Lab</div>
    <div class="nav-links">
      <button class="nav-btn" id="nav-home" onclick="switchView('home')">Dashboard</button>
      <button class="nav-btn" id="nav-vocab" onclick="switchView('vocab')">Vocabulary Lab</button>
    </div>
  </div>
  <div id="topbar-right">
    <div id="timer" style="font-weight:600; font-variant-numeric: tabular-nums;">60:00</div>
  </div>
</div>

<div id="home-view" class="view active">
  <div class="dash-grid">
    <div class="main-col">
      <h2 class="section-title">Question Bank</h2>
      <div class="book-shelf" id="library-grid">
        </div>
    </div>
    <div class="side-col">
      <h2 class="section-title" style="font-size:16px;">My Learning</h2>
      <div class="vocab-quick-list">
        <div class="vocab-stat-row">
          <span>Words Collected</span>
          <strong id="stat-total-words">0</strong>
        </div>
        <div style="margin-top:10px;">
            <button class="btn-primary" style="width:100%" onclick="switchView('vocab')">Review All Words</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="test-view" class="view">
  <div id="passage-panel">
    <div style="padding: 16px 40px; border-bottom:1px solid var(--rule2); display:flex; justify-content:space-between; align-items:center;">
        <span id="p-label" style="font-size:11px; font-weight:600; color:var(--ink3); text-transform:uppercase;"></span>
        <button onclick="switchView('home')" style="background:none; border:none; color:var(--accent); font-size:12px; cursor:pointer;">← Back to Library</button>
    </div>
    <div id="passage-body"></div>
  </div>
  <div id="questions-panel">
    <div id="q-body"></div>
    <div id="q-footer">
      <span id="q-status" style="font-size:12px; color:var(--ink3);"></span>
      <button class="btn-primary" onclick="submitTest()">Submit Section</button>
    </div>
  </div>
</div>

<div id="vocab-view" class="view">
  <div class="vocab-container">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2 class="section-title" style="margin:0;">Vocabulary Lab</h2>
        <div style="font-size:13px; color:var(--ink3);">Click on words to see context or edit</div>
    </div>
    <div id="vocab-full-list"></div>
  </div>
</div>

<div id="color-popup">
  <div style="font-size:10px; text-transform:uppercase; margin-bottom:8px; color:var(--ink3);">Select Category</div>
  <div id="cp-colors" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:6px;"></div>
</div>

<div id="hl-popup">
  <div id="hl-word" style="font-weight:600; font-family:var(--serif); font-size:18px; margin-bottom:4px;"></div>
  <div id="hl-cat" style="font-size:11px; color:var(--ink3); margin-bottom:12px;"></div>
  <button onclick="deleteWord()" style="width:100%; padding:6px; background:var(--red); color:white; border:none; border-radius:4px; font-size:11px; cursor:pointer;">Remove Highlight</button>
</div>

<script>
// ─── DATA CONFIG ───
const LIBRARY = [
  { id: 'c3-1', series: 'Cambridge 3', title: 'The Growth of Cities', passage: 'Urbanization has been a key feature of the last century...', questions: [{id:'q1', number:1, type:'fill', text:'The main feature of last century was ___.', answer:'urbanization'}] },
  { id: 'c4-1', series: 'Cambridge 4', title: 'Adult Education', passage: 'Lifelong learning has become a necessity in the modern era...', questions: [{id:'q2', number:1, type:'mcq', text:'Education is now a:', options:['Option','Necessity'], answer:1}] },
  { id: 'c5-1', series: 'Cambridge 5', title: 'Nature or Nurture', passage: 'The debate between genetic inheritance and environmental factors...', questions: [{id:'q3', number:1, type:'tfng', text:'Environment is the only factor.', answer:'FALSE'}] }
];

const COLORS = [
  { name: 'Must Learn', css: 'rgba(255,225,80,0.5)', hex: '#ffe150' },
  { name: 'Academic',  css: 'rgba(100,200,130,0.45)', hex: '#64c882' },
  { name: 'Collocation', css: 'rgba(80,160,240,0.4)', hex: '#50a0f0' }
];

// ─── STATE ───
let state = {
  view: 'home',
  activeTest: null,
  answers: {},
  vocab: JSON.parse(localStorage.getItem('ielts_vocab_v2') || '[]'),
  timer: 3600
};

let currentSelection = null;

// ─── INITIALIZATION ───
function init() {
  renderLibrary();
  renderVocabStats();
  startTimer();
  
  // Highlighting Listener
  document.getElementById('passage-body').onmouseup = handleTextSelection;
}

// ─── VIEW NAVIGATION ───
function switchView(viewName) {
  state.view = viewName;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById(`${viewName}-view`).classList.add('active');
  const nav = document.getElementById(`nav-${viewName}`);
  if(nav) nav.classList.add('active');

  if(viewName === 'home') {
      renderLibrary();
      renderVocabStats();
  }
  if(viewName === 'vocab') renderVocabPage();
}

// ─── HOME RENDER ───
function renderLibrary() {
  const grid = document.getElementById('library-grid');
  grid.innerHTML = LIBRARY.map(item => `
    <div class="book-card" onclick="startTest('${item.id}')">
      <div class="book-tag">${item.series}</div>
      <div class="book-title">${item.title}</div>
      <div class="book-progress">
        <div class="book-progress-fill" style="width: 0%"></div>
      </div>
    </div>
  `).join('');
}

// ─── TEST RENDER ───
function startTest(id) {
  state.activeTest = LIBRARY.find(b => b.id === id);
  switchView('test');
  
  document.getElementById('p-label').textContent = `${state.activeTest.series} / ${state.activeTest.title}`;
  document.getElementById('passage-body').innerHTML = state.activeTest.passage.split('\n').map(p => `<p>${p}</p>`).join('');
  
  const qBody = document.getElementById('q-body');
  qBody.innerHTML = '';
  state.activeTest.questions.forEach(q => {
      const div = document.createElement('div');
      div.className = 'q-block';
      div.style = "background:white; padding:16px; border-radius:8px; border:1px solid var(--rule); margin-bottom:12px;";
      div.innerHTML = `<div style="font-size:11px; color:var(--ink3)">Q${q.number} - ${q.type}</div>
                       <div style="font-family:var(--serif); margin:8px 0;">${q.text}</div>
                       <input class="q-fill" style="width:100%; padding:8px; border:1px solid var(--rule); border-radius:4px;" 
                              placeholder="Your answer..." oninput="state.answers['${q.id}']=this.value">`;
      qBody.appendChild(div);
  });
  
  reapplyHighlights();
}

// ─── VOCAB LOGIC ───
function handleTextSelection() {
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed || sel.toString().length < 2) return;
  
  currentSelection = {
    word: sel.toString().trim(),
    context: sel.anchorNode.parentElement.innerText
  };
  
  const popup = document.getElementById('color-popup');
  const rect = sel.getRangeAt(0).getBoundingClientRect();
  popup.style.display = 'block';
  popup.style.left = `${rect.left}px`;
  popup.style.top = `${rect.bottom + window.scrollY + 10}px`;
  
  const colorContainer = document.getElementById('cp-colors');
  colorContainer.innerHTML = COLORS.map((c, i) => `
    <div onclick="saveWord(${i})" style="background:${c.css}; padding:8px; border-radius:4px; font-size:10px; cursor:pointer; text-align:center;">
      ${c.name}
    </div>
  `).join('');
}

function saveWord(colorIdx) {
  const c = COLORS[colorIdx];
  const newWord = {
    ...currentSelection,
    cat: c.name,
    color: c.css,
    id: Date.now()
  };
  
  state.vocab.push(newWord);
  localStorage.setItem('ielts_vocab_v2', JSON.stringify(state.vocab));
  
  reapplyHighlights();
  document.getElementById('color-popup').style.display = 'none';
  window.getSelection().removeAllRanges();
}

function reapplyHighlights() {
  const body = document.getElementById('passage-body');
  let html = state.activeTest.passage.split('\n').map(p => `<p>${p}</p>`).join('');
  
  state.vocab.forEach(v => {
    const regex = new RegExp(`(${v.word})`, 'gi');
    html = html.replace(regex, `<mark class="hl" style="background:${v.color}" onclick="showHlPopup('${v.word}', '${v.cat}', event)">$1</mark>`);
  });
  body.innerHTML = html;
}

function showHlPopup(word, cat, e) {
    e.stopPropagation();
    const popup = document.getElementById('hl-popup');
    document.getElementById('hl-word').textContent = word;
    document.getElementById('hl-cat').textContent = cat;
    popup.style.display = 'block';
    popup.style.left = `${e.pageX}px`;
    popup.style.top = `${e.pageY + 10}px`;
}

function deleteWord() {
    const wordText = document.getElementById('hl-word').textContent;
    state.vocab = state.vocab.filter(v => v.word !== wordText);
    localStorage.setItem('ielts_vocab_v2', JSON.stringify(state.vocab));
    document.getElementById('hl-popup').style.display = 'none';
    reapplyHighlights();
}

// ─── VOCAB PAGE RENDER ───
function renderVocabPage() {
    const container = document.getElementById('vocab-full-list');
    container.innerHTML = '';
    
    if(state.vocab.length === 0) {
        container.innerHTML = `<div style="text-align:center; color:var(--ink3); padding:60px;">No words marked yet. Start a test to collect vocabulary.</div>`;
        return;
    }

    const categories = [...new Set(state.vocab.map(v => v.cat))];
    categories.forEach(cat => {
        const catWords = state.vocab.filter(v => v.cat === cat);
        const section = document.createElement('div');
        section.className = 'vocab-category-block';
        section.innerHTML = `
            <div class="cat-header">
                <span style="font-weight:600; color:var(--accent)">${cat}</span>
                <span style="font-size:12px; color:var(--ink3)">${catWords.length} words</span>
            </div>
            <table class="vocab-table">
                <thead><tr><th width="30%">Word</th><th>Context Snippet</th><th width="10%">Action</th></tr></thead>
                <tbody>
                    ${catWords.map(v => `
                        <tr>
                            <td><span class="word-text">${v.word}</span></td>
                            <td style="color:var(--ink2); font-style:italic; font-size:13px;">"...${v.context.substring(0,60)}..."</td>
                            <td><button onclick="deleteWordByText('${v.word}')" style="background:none; border:none; color:var(--red); cursor:pointer;">×</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        container.appendChild(section);
    });
}

function deleteWordByText(txt) {
    state.vocab = state.vocab.filter(v => v.word !== txt);
    localStorage.setItem('ielts_vocab_v2', JSON.stringify(state.vocab));
    renderVocabPage();
}

function renderVocabStats() {
    document.getElementById('stat-total-words').textContent = state.vocab.length;
}

function startTimer() {
    setInterval(() => {
        state.timer--;
        const m = Math.floor(state.timer / 60);
        const s = state.timer % 60;
        document.getElementById('timer').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    }, 1000);
}

// Global click to close popups
document.addEventListener('mousedown', e => {
    if(!e.target.closest('#color-popup') && !e.target.closest('#hl-popup')) {
        document.getElementById('color-popup').style.display = 'none';
        document.getElementById('hl-popup').style.display = 'none';
    }
});

init();
</script>
</body>
</html>
